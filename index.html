    {q: "148. Motivation improves", options: ["A) Performance", "B) Conflict", "C) Stress", "D) Absenteeism"], a: "A"},
    {q: "149. Job satisfaction improves", options: ["A) Performance", "B) Turnover", "C) Absenteeism", "D) Conflict"], a: "A"},
    {q: "150. Leadership improves", options: ["A) Organizational performance", "B) Conflict", "C) Stress", "D) Absenteeism"], a: "A"}
];

const root = document.getElementById('quiz-root');

mcqs.forEach((m, idx) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question-block';
    
    let optsHtml = '';
    m.options.forEach(o => {
        optsHtml += `<label><input type="radio" name="q${idx}"> ${o}</label>`;
    });

    qDiv.innerHTML = `
        <div class="question-text">${m.q}</div>
        <div class="options">${optsHtml}</div>
        <div class="controls">
            <button id="btn-${idx}" onclick="toggleAns(${idx})">Show Answer</button>
        </div>
        <div id="ans-${idx}" class="answer-display">✅ Correct Answer: ${m.a}</div>
    `;
    
    root.appendChild(qDiv);
});

function toggleAns(id) {
    const box = document.getElementById(`ans-${id}`);
    const btn = document.getElementById(`btn-${id}`);
    
    if (box.style.display === 'block') {
        box.style.display = 'none';
        btn.innerText = 'Show Answer';
        btn.classList.remove('active');
    } else {
        box.style.display = 'block';
        btn.innerText = 'Hide Answer';
        btn.classList.add('active');
    }
}
</script>
