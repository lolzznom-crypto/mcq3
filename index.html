<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap');

body {
    font-family: Arial, sans-serif;
    margin: 10px;
    background: #f4f6f8;
    line-height: 1.5;
}

h1 {
    text-align: center;
    font-size: 22px;
    color: #333;
}

.question {
    background: #fff;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.question p {
    font-weight: bold;
    margin-bottom: 10px;
}

.options label {
    display: block;
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
    background: #f9f9f9;
    border: 1px solid #eee;
    cursor: pointer;
    transition: 0.2s;
}

.options label:hover {
    background: #eef2ff;
}

button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

button.hide {
    background: #6c757d;
}

.answer-box {
    margin-top: 10px;
    padding: 10px;
    background: #d4edda;
    color: #155724;
    border-radius: 5px;
    font-weight: bold;
    display: none;
}

/* Personal Message Styling */
.personal-note {
    margin: 40px auto;
    text-align: center;
    padding: 20px;
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    color: #d63384; /* Loving Rose Pink/Red */

    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(214, 51, 132, 0.2);
    max-width: 500px;
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

const container = document.getElementById("quiz");

questions.forEach((item, index) => {

        <button id="btn${index}" onclick="toggleAnswer(${index})">Show Answer</button>

function toggleAnswer(i) {
    const ansDiv = document.getElementById("ans" + i);
    const btn = document.getElementById("btn" + i);
    if (ansDiv.style.display === "block") {
        ansDiv.style.display = "none";
        btn.innerText = "Show Answer";
        btn.classList.remove("hide");
    } else {
        ansDiv.style.display = "block";
        btn.innerText = "Hide Answer";
        btn.classList.add("hide");
